<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>成考 · 手机号激活学习</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background: linear-gradient(145deg, #f4f8fc 0%, #e6eef5 100%); min-height: 100vh; padding: 24px 20px; }
        .app-wrapper { max-width: 1200px; margin: 0 auto; background: rgba(255,255,255,0.65); backdrop-filter: blur(14px); border-radius: 48px; padding: 28px; }
        .header { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; margin-bottom: 26px; padding-bottom: 16px; border-bottom: 2px dashed rgba(0,40,60,0.10); }
        .logo-area { display: flex; align-items: center; gap: 12px; }
        .logo-icon { background: #1a3b4f; color: white; width: 48px; height: 48px; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 26px; }
        .logo-text { font-weight: 700; font-size: 1.9rem; color: #0a2a38; }
        .logo-text span { color: #2f7a9e; font-weight: 300; }
        .activation-badge { background: #ffffffcc; padding: 10px 24px; border-radius: 100px; font-weight: 500; color: #1f4b62; font-size: 0.95rem; display: flex; align-items: center; gap: 12px; }
        .activation-badge i { color: #3b8bb0; }

        .activation-area { background: #ffffffdd; border-radius: 40px; padding: 20px 28px; margin-bottom: 32px; display: flex; flex-wrap: wrap; align-items: center; justify-content: center; gap: 18px 20px; border: 1px solid rgba(255,255,255,0.9); }
        .activation-input-group { display: flex; flex-wrap: wrap; align-items: center; gap: 12px; flex: 2 1 300px; }
        .activation-input-group label { font-weight: 600; color: #174052; font-size: 1rem; display: flex; align-items: center; gap: 6px; }
        .activation-input-group label i { color: #2b7a9e; }
        .activation-input-group input { flex: 1; min-width: 170px; padding: 14px 22px; border: 1.5px solid #d5e3ec; border-radius: 60px; font-size: 1rem; background: #f2f8fe; outline: none; }
        .activation-input-group input:focus { border-color: #2f8db0; background: white; box-shadow: 0 0 0 4px rgba(47,141,176,0.15); }
        .btn { background: #eef4f9; border: none; padding: 14px 34px; border-radius: 60px; font-weight: 600; font-size: 1rem; color: #1f4b62; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; border: 1px solid rgba(255,255,255,0.6); }
        .btn-primary { background: #1a4d66; color: white; border: 1px solid #2b6d8a; }
        .btn-primary:hover { background: #0f3f55; transform: scale(1.02); }
        .status-message { font-size: 0.95rem; padding: 6px 18px; border-radius: 40px; background: #e7f1f8; color: #1c5770; display: inline-flex; align-items: center; gap: 10px; font-weight: 500; }
        .status-message.success { background: #dff0e6; color: #1b6b4a; }
        .status-message.error { background: #ffe6e6; color: #b13e3e; }

        .subject-folder { background: #ffffffdd; border-radius: 32px; margin-bottom: 24px; border: 1px solid rgba(255,255,255,0.8); overflow: hidden; }
        .folder-header { display: flex; align-items: center; justify-content: space-between; padding: 18px 28px; cursor: pointer; border-radius: 32px; }
        .folder-header:hover { background: rgba(200,220,240,0.15); }
        .folder-header-left { display: flex; align-items: center; gap: 16px; }
        .folder-header-left i { font-size: 1.8rem; color: #2f7a9e; width: 36px; text-align: center; }
        .folder-header-left h2 { font-size: 1.6rem; font-weight: 700; color: #123b4f; }
        .folder-header-left .badge-count { background: #c5dceb; padding: 4px 16px; border-radius: 40px; font-size: 0.8rem; font-weight: 600; color: #104257; margin-left: 6px; }
        .folder-toggle { font-size: 1.3rem; color: #4f7f99; transition: transform 0.25s ease; }
        .folder-toggle.open { transform: rotate(180deg); }
        .folder-content { max-height: 0; overflow: hidden; transition: max-height 0.4s ease, padding 0.2s ease; padding: 0 28px; }
        .folder-content.open { max-height: 3000px; padding: 0 28px 28px 28px; }
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px,1fr)); gap: 22px; margin-top: 6px; }
        .video-card { background: #ffffffdd; border-radius: 24px; padding: 14px; box-shadow: 0 6px 16px -6px rgba(0,30,40,0.04); border: 1px solid rgba(255,255,255,0.8); display: flex; flex-direction: column; }
        .video-card:hover { transform: translateY(-3px); box-shadow: 0 16px 28px -12px rgba(0,50,70,0.12); border-color: #cce0ed; }
        .video-thumbnail { position: relative; border-radius: 18px; overflow: hidden; background: #0e2a38; aspect-ratio: 16/9; display: flex; align-items: center; justify-content: center; margin-bottom: 12px; }
        .video-thumbnail i { font-size: 2.8rem; color: rgba(255,255,255,0.5); }
        .video-card.locked .video-thumbnail i { color: rgba(255,215,120,0.5); }
        .video-thumbnail .lock-overlay { position: absolute; inset: 0; background: rgba(10,30,42,0.45); backdrop-filter: blur(2px); display: flex; align-items: center; justify-content: center; font-size: 1.8rem; color: #ffd966; }
        .video-meta { flex: 1; display: flex; flex-direction: column; }
        .video-title { font-weight: 700; font-size: 1.0rem; color: #12303f; margin-bottom: 2px; display: flex; align-items: center; justify-content: space-between; }
        .video-title .section-num { font-size: 0.65rem; background: #dce8f2; padding: 2px 12px; border-radius: 40px; font-weight: 600; color: #1a4d66; }
        .video-desc { color: #4d6f86; font-size: 0.8rem; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
        .video-desc i { color: #598aa8; }
        .video-player-container { margin-top: 2px; border-radius: 16px; overflow: hidden; background: #0a1e2a; width: 100%; aspect-ratio: 16/9; }
        .video-player-container video { width: 100%; height: 100%; display: block; background: #0a1e2a; object-fit: contain; }
        .video-card.locked .video-player-container { display: none; }
        .video-card.locked .video-player-placeholder { display: flex; }
        .video-player-placeholder { background: #eaf2f9; border-radius: 60px; padding: 10px 12px; text-align: center; font-weight: 500; color: #21506a; border: 1px dashed #b6d0e0; margin-top: 2px; font-size: 0.85rem; display: flex; align-items: center; justify-content: center; gap: 8px; min-height: 46px; }
        .video-card.locked .video-player-placeholder { background: #f2f2f2; color: #7d7d7d; border-color: #d6d6d6; }
        .video-card.locked .video-player-placeholder i { color: #a0a0a0; }
        .unlock-hint { margin-top: 8px; font-size: 0.7rem; color: #5f7e93; background: #eaf3fa; padding: 3px 14px; border-radius: 60px; display: inline-block; align-self: flex-start; }
        .video-card.locked .unlock-hint i { color: #a0b8c9; }
        .free-tag { background: #ff6b35; color: white; padding: 2px 10px; border-radius: 40px; font-size: 0.6rem; font-weight: 700; margin-left: 6px; }
        .footer-note { margin-top: 42px; text-align: center; color: #406b81; font-size: 0.9rem; border-top: 1px solid rgba(0,0,0,0.03); padding-top: 26px; display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
        .footer-note i { margin-right: 6px; color: #2d7a9e; }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #1a2a38; color: white; padding: 14px 32px; border-radius: 60px; font-weight: 500; z-index: 999; opacity: 0; transition: opacity 0.4s; pointer-events: none; }
        .toast.show { opacity: 1; }
        .toast.success { background: #1f7a5a; }
        .toast.error { background: #b13e3e; }
        @media (max-width: 700px) {
            .app-wrapper { padding: 18px 14px; }
            .logo-text { font-size: 1.4rem; }
            .activation-area { flex-direction: column; align-items: stretch; }
            .activation-input-group { flex-direction: column; align-items: stretch; }
            .btn { justify-content: center; }
            .header { flex-direction: column; align-items: start; gap: 12px; }
            .folder-header { padding: 14px 18px; }
            .folder-header-left h2 { font-size: 1.3rem; }
            .folder-content { padding: 0 14px; }
            .folder-content.open { padding: 0 14px 20px 14px; }
            .video-grid { grid-template-columns: repeat(auto-fill, minmax(200px,1fr)); }
        }
    </style>
</head>
<body>
<div class="app-wrapper">
    <header class="header">
        <div class="logo-area">
            <div class="logo-icon"><i class="fas fa-graduation-cap"></i></div>
            <div class="logo-text">成考<span>· 云课堂</span></div>
        </div>
        <div class="activation-badge">
            <i class="fas fa-shield-alt"></i>
            <span>状态: <span id="globalStatusText">未激活</span></span>
        </div>
    </header>

    <div class="activation-area">
        <div class="activation-input-group">
            <label for="phoneInput"><i class="fas fa-phone-alt"></i> 手机号</label>
            <input type="tel" id="phoneInput" placeholder="请输入手机号码" maxlength="11">
            <button class="btn btn-primary" id="activateBtn"><i class="fas fa-unlock"></i> 激活</button>
        </div>
        <div id="statusMessage" class="status-message">
            <i class="fas fa-info-circle"></i> 输入手机号激活
        </div>
    </div>

    <div id="subjectContainer"></div>

    <div class="footer-note">
        <span><i class="fas fa-video"></i> 成考语数外 · 每科12节精讲</span>
        <span><i class="fas fa-cloud-upload-alt"></i> 七牛云存储</span>
        <span><i class="fas fa-gift"></i> 第1、3、5节免费试看</span>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    (function() {
        // ================================================================
        // ★★★ 配置区 ★★★
        // ================================================================
        const BASE_VIDEO_URL = 'http://cddsw.zyzcc.cn/26xinjian/';

        // ★★★ Supabase 配置（替换为你的） ★★★
        const SUPABASE_URL = 'https://pexthueueakiugsyhrlh.supabase.co';
        // 请确保这一行是你刚刚复制的完整密钥，不要手动输入
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBleHRodWV1YWVraXVnc3locmxoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5NDUwNTgsImV4cCI6MjA5NzUyMTA1OH0.bcpscIbQR6t44T6ynz0BBVrytqV_LcdUgzqIFlDgwL0';

        // ================================================================
        // 科目数据（语数外，每科12节）
        // ================================================================
        const subjectsData = [
            { id: 'chinese', name: '语文', icon: 'fa-book-open', prefix: '01xinxiyuxinxihua' },
            { id: 'math', name: '数学', icon: 'fa-square-root-variable', prefix: '02shuxue' },
            { id: 'english', name: '英语', icon: 'fa-language', prefix: '03yingyu' }
        ];

        function generateLessons(subject) {
            const lessons = [];
            for (let i = 1; i <= 12; i++) {
                const num = String(i).padStart(2, '0');
                const isFree = [1, 3, 5].includes(i);
                lessons.push({
                    title: `第${i}节 · 精讲`,
                    desc: `成考${subject.name}第${i}讲`,
                    videoSrc: `${BASE_VIDEO_URL}${subject.prefix}${num}.mp4`,
                    isFree: isFree
                });
            }
            return lessons;
        }

        // ================================================================
        // Supabase 数据操作
        // ================================================================
        async function querySupabase(query, options = {}) {
            const url = `${SUPABASE_URL}/rest/v1/${query}`;
            const headers = {
                'apikey': SUPABASE_ANON_KEY,
                'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                'Content-Type': 'application/json'
            };

            const response = await fetch(url, {
                method: options.method || 'GET',
                headers: headers,
                body: options.body ? JSON.stringify(options.body) : undefined
            });

            if (!response.ok) {
                throw new Error(`Supabase API 错误: ${response.status}`);
            }
            return await response.json();
        }

        async function isPhoneAuthorized(phone) {
            try {
                const result = await querySupabase(`phone_whitelist?phone=eq.${phone}&select=phone`);
                return result && result.length > 0;
            } catch (err) {
                console.error('验证失败:', err);
                return false;
            }
        }

        // ================================================================
        // DOM 操作
        // ================================================================
        const container = document.getElementById('subjectContainer');
        const phoneInput = document.getElementById('phoneInput');
        const activateBtn = document.getElementById('activateBtn');
        const statusMsg = document.getElementById('statusMessage');
        const globalStatusText = document.getElementById('globalStatusText');
        const toast = document.getElementById('toast');

        let isActivated = false;
        let activePhone = '';
        let toastTimer = null;

        function showToast(message, type = 'info') {
            toast.textContent = message;
            toast.className = 'toast';
            if (type === 'success') toast.classList.add('success');
            else if (type === 'error') toast.classList.add('error');
            toast.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => { toast.classList.remove('show'); }, 3000);
        }

        function setStatus(message, type = 'info') {
            statusMsg.innerHTML = message;
            statusMsg.className = 'status-message';
            if (type === 'success') statusMsg.classList.add('success');
            else if (type === 'error') statusMsg.classList.add('error');
        }

        function renderSubjects(activated) {
            if (!container) return;
            let html = '';
            subjectsData.forEach((subject) => {
                const lessons = generateLessons(subject);
                const subjectId = subject.id;
                html += `<div class="subject-folder" data-subject="${subjectId}">
                    <div class="folder-header" data-target="${subjectId}">
                        <div class="folder-header-left">
                            <i class="fas ${subject.icon}"></i>
                            <h2>${subject.name}</h2>
                            <span class="badge-count">${lessons.length} 节</span>
                        </div>
                        <div class="folder-toggle" data-target="${subjectId}">
                            <i class="fas fa-chevron-down"></i>
                        </div>
                    </div>
                    <div class="folder-content" id="content-${subjectId}">
                        <div class="video-grid">`;

                lessons.forEach((lesson, lIdx) => {
                    const isUnlocked = activated || lesson.isFree;
                    const lockedClass = isUnlocked ? '' : 'locked';
                    const freeClass = lesson.isFree ? 'free' : '';
                    const lockDisplay = isUnlocked ? 'none' : 'flex';
                    const playerDisplay = isUnlocked ? 'block' : 'none';
                    const placeholderDisplay = isUnlocked ? 'none' : 'flex';

                    let statusText = '';
                    if (lesson.isFree && !activated) {
                        statusText = '<i class="fas fa-play" style="color:#ff6b35;"></i> 免费试看';
                    } else if (activated) {
                        statusText = '<i class="fas fa-check-circle" style="color:#2a7a4a;"></i> 已解锁';
                    } else {
                        statusText = '<i class="fas fa-lock"></i> 未解锁';
                    }

                    html += `
                        <div class="video-card ${lockedClass} ${freeClass}" data-locked="${!isUnlocked}">
                            <div class="video-thumbnail">
                                <i class="fas ${subject.icon}"></i>
                                <div class="lock-overlay" style="display:${lockDisplay};"><i class="fas fa-lock"></i></div>
                            </div>
                            <div class="video-meta">
                                <div class="video-title">
                                    ${lesson.title}
                                    ${lesson.isFree ? '<span class="free-tag"><i class="fas fa-play"></i> 试看</span>' : ''}
                                    <span class="section-num">${lIdx+1}/12</span>
                                </div>
                                <div class="video-desc"><i class="fas fa-tag"></i> ${lesson.desc}</div>
                                <div class="video-player-container" style="display:${playerDisplay};">
                                    <video controls preload="metadata">
                                        <source src="${lesson.videoSrc}" type="video/mp4">
                                        您的浏览器不支持 video 标签。
                                    </video>
                                </div>
                                <div class="video-player-placeholder" style="display:${placeholderDisplay};">
                                    <i class="fas fa-play-circle"></i> 激活后观看
                                </div>
                                <span class="unlock-hint">${statusText}</span>
                            </div>
                        </div>
                    `;
                });

                html += `</div></div></div>`;
            });
            container.innerHTML = html;

            document.querySelectorAll('.folder-header').forEach(header => {
                header.addEventListener('click', function() {
                    const targetId = this.dataset.target;
                    const content = document.getElementById(`content-${targetId}`);
                    const toggleIcon = this.querySelector('.folder-toggle i');
                    if (content) {
                        content.classList.toggle('open');
                        this.querySelector('.folder-toggle').classList.toggle('open');
                        toggleIcon.className = content.classList.contains('open') ? 'fas fa-chevron-up' : 'fas fa-chevron-down';
                    }
                });
            });
        }

        function updateAllCards(activated) {
            const cards = document.querySelectorAll('.video-card');
            cards.forEach(card => {
                const isFree = card.classList.contains('free');
                const isUnlocked = activated || isFree;
                
                const lockOverlay = card.querySelector('.lock-overlay');
                const playerContainer = card.querySelector('.video-player-container');
                const placeholder = card.querySelector('.video-player-placeholder');
                const unlockHint = card.querySelector('.unlock-hint');
                const thumbnailIcon = card.querySelector('.video-thumbnail i');

                if (isUnlocked) {
                    card.classList.remove('locked');
                    card.dataset.locked = 'false';
                    if (lockOverlay) lockOverlay.style.display = 'none';
                    if (placeholder) placeholder.style.display = 'none';
                    if (playerContainer) playerContainer.style.display = 'block';
                    if (thumbnailIcon) thumbnailIcon.style.color = '#b8d9f0';
                    
                    if (isFree && !activated) {
                        unlockHint.innerHTML = '<i class="fas fa-play" style="color:#ff6b35;"></i> 免费试看';
                        unlockHint.style.background = '#fff3e6';
                        unlockHint.style.color = '#ff6b35';
                    } else {
                        unlockHint.innerHTML = '<i class="fas fa-check-circle" style="color:#2a7a4a;"></i> 已解锁';
                        unlockHint.style.background = '#dff0e6';
                        unlockHint.style.color = '#1b6b4a';
                    }
                } else {
                    card.classList.add('locked');
                    card.dataset.locked = 'true';
                    if (lockOverlay) lockOverlay.style.display = 'flex';
                    if (placeholder) placeholder.style.display = 'flex';
                    if (playerContainer) playerContainer.style.display = 'none';
                    if (thumbnailIcon) thumbnailIcon.style.color = 'rgba(255,255,255,0.7)';
                    unlockHint.innerHTML = '<i class="fas fa-lock"></i> 未解锁';
                    unlockHint.style.background = '#eaf3fa';
                    unlockHint.style.color = '#5f7e93';
                }
            });

            globalStatusText.textContent = activated ? `已激活 (${activePhone})` : '未激活';
            globalStatusText.style.color = activated ? '#1b7a4a' : '#b13e3e';
        }

        // ================================================================
        // 激活逻辑
        // ================================================================
        async function performActivation(phone) {
            if (!phone || phone.trim() === '') {
                setStatus('⚠️ 请输入手机号码', 'error');
                return false;
            }
            const rawPhone = phone.trim();
            if (!/^\d{11}$/.test(rawPhone)) {
                setStatus('❌ 请输入11位有效手机号', 'error');
                return false;
            }

            setStatus('⏳ 正在验证...', 'info');
            try {
                const authorized = await isPhoneAuthorized(rawPhone);
                if (authorized) {
                    isActivated = true;
                    activePhone = rawPhone;
                    setStatus(`✅ 激活成功！欢迎回来`, 'success');
                    updateAllCards(true);
                    phoneInput.value = rawPhone;
                    showToast(`✅ 欢迎回来，${rawPhone}`, 'success');
                    return true;
                } else {
                    isActivated = false;
                    activePhone = '';
                    setStatus(`❌ 该手机号未绑定，请联系管理员`, 'error');
                    updateAllCards(false);
                    showToast(`❌ 手机号未绑定`, 'error');
                    return false;
                }
            } catch (err) {
                setStatus(`❌ 验证失败: ${err.message}`, 'error');
                showToast(`❌ ${err.message}`, 'error');
                return false;
            }
        }

        function deactivate() {
            isActivated = false;
            activePhone = '';
            setStatus('🔒 已退出激活', 'info');
            updateAllCards(false);
            phoneInput.value = '';
        }

        // ================================================================
        // 初始化
        // ================================================================
        function init() {
            renderSubjects(false);
            updateAllCards(false);
            setStatus('📱 输入已绑定的手机号激活，或试看第1、3、5节', 'info');
            console.log('🎯 成考视频学习平台已加载（Supabase 云端存储）');
            console.log(`📁 项目地址: ${SUPABASE_URL}`);
        }

        // ================================================================
        // 事件绑定
        // ================================================================
        activateBtn.addEventListener('click', function() {
            performActivation(phoneInput.value);
        });

        phoneInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                activateBtn.click();
            }
        });

        phoneInput.addEventListener('input', function() {
            this.value = this.value.replace(/\D/g, '');
        });

        phoneInput.addEventListener('dblclick', function() {
            if (isActivated) {
                if (confirm('退出当前激活？')) deactivate();
            }
        });

        init();

        // 检查配置
        if (SUPABASE_URL === 'https://你的项目地址.supabase.co') {
            console.warn('⚠️ 请先在代码中配置 SUPABASE_URL 和 SUPABASE_ANON_KEY');
        }
    })();
</script>
</body>
</html>
